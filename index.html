<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>보이스위키</title>
  <style>
    :root {
      --bg: #0f1115; --card: #171a21; --text: #e8eaed; --muted: #9aa0a6;
      --accent: #e5484d; --accent-dim: #7a2528; --ok: #3fb950; --border: #262b33;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, "Noto Sans KR", "Malgun Gothic", sans-serif;
      display: flex; flex-direction: column;
      height: 100vh;            /* 폴백 */
      height: 100dvh;           /* 모바일 주소창 반영한 실제 뷰포트 높이 */
      overflow: hidden;         /* 한 화면에 고정 — 스크롤 방지 */
      padding: clamp(12px, 2.5vh, 24px) 20px calc(clamp(12px, 2.5vh, 24px) + env(safe-area-inset-bottom));
    }
    header { text-align: center; }
    header h1 { font-size: 22px; margin: 0; letter-spacing: -0.5px; }
    header p { color: var(--muted); font-size: 13px; margin: 6px 0 0; }

    main { flex: 1; min-height: 0; display: flex; flex-direction: column;
           align-items: center; justify-content: center; gap: clamp(10px, 2.4vh, 28px); }

    .rec-btn {
      width: clamp(150px, 34vh, 200px); height: clamp(150px, 34vh, 200px);
      flex-shrink: 0; border-radius: 50%; border: none;
      background: var(--accent); color: #fff; font-size: 20px; font-weight: 600;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; transition: transform .1s ease, background .2s ease;
      box-shadow: 0 8px 30px rgba(229,72,77,.35);
    }
    .rec-btn:active { transform: scale(.96); }
    .rec-btn .icon { font-size: 44px; line-height: 1; }
    .rec-btn.recording { background: var(--accent-dim); animation: pulse 1.2s infinite; }
    .rec-btn:disabled { opacity: .5; box-shadow: none; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229,72,77,.5); }
      50% { box-shadow: 0 0 0 22px rgba(229,72,77,0); }
    }

    .timer { font-size: 34px; font-variant-numeric: tabular-nums; min-height: 40px; }
    .status { color: var(--muted); font-size: 14px; text-align: center; min-height: 20px; padding: 0 10px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--accent); }

    .actions { display: flex; gap: 12px; width: 100%; max-width: 420px; margin: 0 auto; }
    .actions button {
      flex: 1; padding: clamp(13px, 2.2vh, 18px); font-size: 17px; font-weight: 600; border-radius: 14px;
      border: 1px solid var(--border); cursor: pointer;
      transition: transform .1s ease, opacity .2s ease;
    }
    .actions button:active { transform: scale(.97); }
    .actions button:disabled { opacity: .4; }
    .btn-save { background: var(--ok); color: #04150a; border-color: transparent; }
    .btn-reset { background: var(--card); color: var(--text); }

    audio { width: 100%; max-width: 420px; margin: 0 auto; height: 40px; }

    .repo-picker { display: flex; flex-direction: column; gap: 6px; width: 100%;
                   max-width: 420px; margin: 0 auto; }
    .repo-picker label { color: var(--muted); font-size: 12px; padding-left: 2px; }
    .repo-picker select {
      width: 100%; padding: 12px 14px; font-size: 15px; border-radius: 12px;
      background: var(--card); color: var(--text); border: 1px solid var(--border);
      appearance: none; cursor: pointer;
    }
    .repo-picker select:disabled { opacity: .5; cursor: default; }

    /* 탭 */
    .tabs { display: flex; gap: 8px; justify-content: center; margin: 12px 0 4px; flex-shrink: 0; }
    .tabs button {
      padding: 8px 18px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s ease, color .15s ease;
    }
    .tabs button.active { background: var(--accent); color: #fff; border-color: transparent; }

    /* 패널 (활성 하나만 flex로 화면 채움) */
    .panel { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .panel[hidden] { display: none; }

    /* 카톡 붙여넣기 영역 */
    .kakao-area { flex: 1; min-height: 0; width: 100%; max-width: 560px;
                  margin: 0 auto; display: flex; }
    .kakao-area textarea {
      flex: 1; width: 100%; resize: none; border-radius: 14px;
      border: 1px solid var(--border); background: var(--card); color: var(--text);
      padding: 14px; font-size: 15px; line-height: 1.5; font-family: inherit;
    }
    .kakao-area textarea:focus { outline: none; border-color: var(--accent-dim); }
  </style>
</head>
<body>
  <header>
    <h1>보이스위키</h1>
    <p>말하면 위키에 쌓입니다</p>
  </header>

  <nav class="tabs">
    <button id="tabVoice" class="active">🎙️ 음성</button>
    <button id="tabKakao">💬 카톡</button>
  </nav>

  <section class="panel" id="voicePanel">
  <main>
    <div class="timer" id="timer">00:00</div>
    <button class="rec-btn" id="recBtn">
      <span class="icon" id="recIcon">🎙️</span>
      <span id="recLabel">녹음</span>
    </button>
    <div class="status" id="status">마이크 버튼을 눌러 녹음하세요</div>
    <audio id="player" controls hidden></audio>

    <div class="repo-picker">
      <label for="repoSelect">저장소</label>
      <select id="repoSelect" disabled>
        <option value="">저장소 불러오는 중…</option>
      </select>
    </div>
  </main>

  <div class="actions">
    <button class="btn-reset" id="resetBtn" disabled>다시</button>
    <button class="btn-save" id="saveBtn" disabled>위키에 저장</button>
  </div>
  </section>

  <section class="panel" id="kakaoPanel" hidden>
    <div class="kakao-area">
      <textarea id="kakaoText" placeholder="카카오톡 대화를 붙여넣으세요&#10;&#10;정보·팁·링크 위주로 정리해 선택한 저장소의 kakao 폴더에 저장됩니다."></textarea>
    </div>

    <div class="repo-picker">
      <label for="kakaoRepoSelect">저장소</label>
      <select id="kakaoRepoSelect" disabled>
        <option value="">저장소 불러오는 중…</option>
      </select>
    </div>

    <div class="status" id="kakaoStatus">정보·팁·링크를 정리해 저장됩니다</div>
    <div class="actions">
      <button class="btn-reset" id="kakaoClear">비우기</button>
      <button class="btn-save" id="kakaoSave">위키에 저장</button>
    </div>
  </section>

  <script>
    // ── 설정 ────────────────────────────────────────────
    // GAS 웹앱 배포 URL (/exec). clasp 재배포 후 값이 바뀌면 여기도 갱신.
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby9Xwhwjy1PbNG1dApRMa_nQi-OdACI0Nkt0aSCNR0d_iH5y5kvih2FIzVRqGTa-rSysA/exec';
    // Code.gs의 VW_TOKEN과 반드시 일치.
    const TOKEN = 'vwk-7f3a91c4e28b5d06';
    // ────────────────────────────────────────────────────

    let mediaRecorder = null, chunks = [], recordedBlob = null;
    let recordedMime = '', recordedAt = null, timerInt = null, seconds = 0;

    const el = (id) => document.getElementById(id);
    const recBtn = el('recBtn'), recIcon = el('recIcon'), recLabel = el('recLabel');
    const saveBtn = el('saveBtn'), resetBtn = el('resetBtn');
    const statusEl = el('status'), timerEl = el('timer'), player = el('player');
    const repoSelect = el('repoSelect'), kakaoRepoSelect = el('kakaoRepoSelect');

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    // ── 저장소 선택 ──────────────────────────────────────
    // 음성 탭과 카톡 탭이 같은 저장소 목록을 쓰되, 선택은 각자 기억(별도 키).
    const REPO_KEY = 'vw_repo';
    const KAKAO_REPO_KEY = 'vw_kakao_repo';
    // JSONP 실패 시 폴백 라벨(백엔드 REPOS와 일치). 정상 로드되면 서버 라벨로 덮어씀.
    const FALLBACK_REPOS = [{ key: 'voice', name: '바이브코딩' }, { key: 'second', name: '일상기록' }];

    // 하나의 select에 저장소 목록을 채우고, 저장된 선택을 복원한다.
    function fillSelect(select, storageKey, list) {
      const saved = localStorage.getItem(storageKey);
      select.innerHTML = '';
      list.forEach((r) => {
        const opt = document.createElement('option');
        opt.value = r.key;
        opt.textContent = r.name;
        select.appendChild(opt);
      });
      if (saved && list.some((r) => r.key === saved)) select.value = saved;
      else localStorage.setItem(storageKey, select.value);
      select.disabled = false;
    }

    function fillRepos(repos) {
      const list = (repos && repos.length) ? repos : FALLBACK_REPOS;
      fillSelect(repoSelect, REPO_KEY, list);
      fillSelect(kakaoRepoSelect, KAKAO_REPO_KEY, list);
    }

    repoSelect.addEventListener('change', () => {
      localStorage.setItem(REPO_KEY, repoSelect.value);
    });
    kakaoRepoSelect.addEventListener('change', () => {
      localStorage.setItem(KAKAO_REPO_KEY, kakaoRepoSelect.value);
    });

    // JSONP로 폴더 이름 목록을 로드(no-cors 때문에 fetch로는 응답을 못 읽음).
    (function loadRepos() {
      let done = false;
      window.vwRepos = (data) => {
        done = true;
        fillRepos(data && data.repos);
      };
      const s = document.createElement('script');
      s.src = GAS_URL + '?list=1&token=' + encodeURIComponent(TOKEN) + '&callback=vwRepos';
      s.onerror = () => { if (!done) fillRepos(null); };
      document.head.appendChild(s);
      // 타임아웃 폴백
      setTimeout(() => { if (!done) fillRepos(null); }, 8000);
    })();

    function pickMimeType() {
      const prefs = ['audio/ogg;codecs=opus', 'audio/webm;codecs=opus', 'audio/webm', 'audio/mp4'];
      for (const t of prefs) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
      }
      return '';
    }

    function fmt(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }
    function startTimer() {
      seconds = 0; timerEl.textContent = '00:00';
      timerInt = setInterval(() => { seconds++; timerEl.textContent = fmt(seconds); }, 1000);
    }
    function stopTimer() { clearInterval(timerInt); timerInt = null; }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = pickMimeType();
        recordedMime = mime;
        mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = () => {
          const type = mediaRecorder.mimeType || recordedMime || 'audio/webm';
          recordedMime = type;
          recordedBlob = new Blob(chunks, { type });
          player.src = URL.createObjectURL(recordedBlob);
          player.hidden = false;
          stream.getTracks().forEach(t => t.stop());
          saveBtn.disabled = false; resetBtn.disabled = false;
          setStatus('녹음 완료 — 저장하거나 다시 녹음하세요', 'ok');
        };
        mediaRecorder.start();
        recordedAt = new Date();
        recBtn.classList.add('recording');
        recIcon.textContent = '⏹️'; recLabel.textContent = '정지';
        saveBtn.disabled = true; resetBtn.disabled = true; player.hidden = true;
        setStatus('녹음 중…', null);
        startTimer();
      } catch (err) {
        setStatus('마이크 접근 실패: ' + err.message, 'err');
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      stopTimer();
      recBtn.classList.remove('recording');
      recIcon.textContent = '🎙️'; recLabel.textContent = '녹음';
    }

    recBtn.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
      else startRecording();
    });

    resetBtn.addEventListener('click', () => {
      recordedBlob = null;
      player.hidden = true; player.removeAttribute('src');
      saveBtn.disabled = true; resetBtn.disabled = true;
      timerEl.textContent = '00:00';
      setStatus('마이크 버튼을 눌러 녹음하세요', null);
    });

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]); // data URL 접두사 제거
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    saveBtn.addEventListener('click', async () => {
      if (!recordedBlob) return;
      saveBtn.disabled = true; resetBtn.disabled = true; recBtn.disabled = true;
      setStatus('저장 중…', null);
      try {
        const base64 = await blobToBase64(recordedBlob);
        // GAS는 교차출처 응답에 CORS 헤더를 안 붙이므로 no-cors로 던지고 낙관적으로 처리.
        // text/plain은 프리플라이트 없는 단순 요청이라 그대로 전달됨.
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            token: TOKEN,
            audio: base64,
            mime: recordedMime,
            ts: recordedAt ? recordedAt.toISOString() : null,
            repo: repoSelect.value || localStorage.getItem(REPO_KEY) || 'voice'
          })
        });
        recBtn.disabled = false;
        setStatus('✅ 전송됨 — Drive raw/voice 폴더를 확인하세요', 'ok');
        resetBtn.disabled = false;
      } catch (err) {
        recBtn.disabled = false;
        setStatus('전송 실패: ' + err.message, 'err');
        saveBtn.disabled = false; resetBtn.disabled = false;
      }
    });

    // ── 탭 전환 (음성 / 카톡) ────────────────────────────
    const TAB_KEY = 'vw_tab';
    const tabVoice = el('tabVoice'), tabKakao = el('tabKakao');
    const voicePanel = el('voicePanel'), kakaoPanel = el('kakaoPanel');

    function setTab(tab) {
      const kakao = tab === 'kakao';
      kakaoPanel.hidden = !kakao;
      voicePanel.hidden = kakao;
      tabKakao.classList.toggle('active', kakao);
      tabVoice.classList.toggle('active', !kakao);
      localStorage.setItem(TAB_KEY, tab);
    }
    tabVoice.addEventListener('click', () => setTab('voice'));
    tabKakao.addEventListener('click', () => setTab('kakao'));
    setTab(localStorage.getItem(TAB_KEY) === 'kakao' ? 'kakao' : 'voice');

    // ── 카톡 정리·저장 ───────────────────────────────────
    const kakaoText = el('kakaoText'), kakaoSave = el('kakaoSave'), kakaoClear = el('kakaoClear');
    const kakaoStatusEl = el('kakaoStatus');

    function setKakaoStatus(msg, kind) {
      kakaoStatusEl.textContent = msg;
      kakaoStatusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    kakaoClear.addEventListener('click', () => {
      kakaoText.value = '';
      setKakaoStatus('정보·팁·링크를 정리해 raw/kakao에 저장됩니다', null);
      kakaoText.focus();
    });

    kakaoSave.addEventListener('click', async () => {
      const text = kakaoText.value.trim();
      if (!text) { setKakaoStatus('먼저 대화를 붙여넣으세요', 'err'); return; }
      kakaoSave.disabled = true; kakaoClear.disabled = true;
      setKakaoStatus('정리 중…', null);
      try {
        // GAS는 no-cors 응답을 못 읽으므로 낙관적으로 처리(fire-and-forget).
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            token: TOKEN,
            text: text,
            kind: 'kakao',
            ts: new Date().toISOString(),
            repo: kakaoRepoSelect.value || localStorage.getItem(KAKAO_REPO_KEY) || 'voice'
          })
        });
        setKakaoStatus('✅ 전송됨 — Drive raw/kakao 폴더를 확인하세요', 'ok');
        kakaoText.value = '';
      } catch (err) {
        setKakaoStatus('전송 실패: ' + err.message, 'err');
      } finally {
        kakaoSave.disabled = false; kakaoClear.disabled = false;
      }
    });
  </script>
</body>
</html>
